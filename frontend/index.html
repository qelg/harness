<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Harness</title>
    <link rel="stylesheet" href="./styles.css?v=3" />
  </head>
  <body>
    <main class="app">
      <aside class="sessions">
        <header class="panel-header">
          <div>
            <h1>Harness</h1>
            <p>Sessions</p>
          </div>
          <button id="refreshSessions" type="button" title="Refresh sessions">Refresh</button>
        </header>

        <form id="createSessionForm" class="create-session">
          <input id="sessionTitle" name="title" placeholder="New session title" autocomplete="off" />
          <input id="sessionTags" name="tags" placeholder="tags, comma separated" autocomplete="off" />
          <button type="submit">Create</button>
        </form>

        <div id="sessionsList" class="sessions-list" aria-live="polite"></div>
      </aside>

      <section class="chat">
        <header class="chat-header">
          <div>
            <h2 id="chatTitle">Select a session</h2>
            <p id="chatMeta">No session selected</p>
          </div>
          <form id="modelForm" class="model-form">
            <label>
              <span>Provider</span>
              <select id="providerSelect">
                <option value="chatgpt-codex">chatgpt-codex</option>
                <option value="mock-llm">mock-llm</option>
                <option value="openrouter">openrouter</option>
                <option value="openai-codex">openai-codex</option>
              </select>
            </label>
            <label>
              <span>Model</span>
              <input id="modelName" placeholder="model" autocomplete="off" />
            </label>
            <fieldset class="toolset-field">
              <legend>Toolsets</legend>
              <div id="toolsetsList" class="toolsets-list"></div>
            </fieldset>
            <button id="saveModel" type="submit">Save</button>
            <p id="modelStatus" class="model-status">No session selected; saving sets the global default.</p>
          </form>
          <section class="auth-panel" aria-label="ChatGPT login">
            <div>
              <strong>ChatGPT</strong>
              <p id="authStatus">Not checked</p>
            </div>
            <button id="loginChatGPT" type="button">Login</button>
            <div id="deviceLogin" class="device-login" hidden></div>
          </section>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="messageForm" class="message-form">
          <textarea id="messageContent" rows="3" placeholder="Write a message" disabled></textarea>
          <button id="sendMessage" type="submit" disabled>Send</button>
        </form>
      </section>
    </main>

    <script src="./app.js?v=6" defer></script>
  </body>
</html>
